name: CI Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: qa
      testSuite:
        description: Test suite to run
        required: true
        default: regression

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display inputs
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Test Suite: ${{ inputs.testSuite }}"

      - name: Run basic CI check
        run: echo "CI pipeline executed successfully."
